<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hill Racer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui">
        <div style="font-size: 24px;">SCORE: <span id="score">0</span></div>
        <div style="width: 180px; height: 20px; background: #333; border: 2px solid #fff; margin-top: 8px;">
            <div id="fuelBar"></div>
        </div>
    </div>

    <div id="gameOver">
        <h1 id="failReason" style="color:#e74c3c">CRASHED!</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="location.reload()" style="padding:12px 24px; cursor:pointer; font-weight:bold; font-family:inherit;">RESTART</button>
    </div>

    <div id="controls">
        <div class="btn" id="btnBrake" style="background: #e67e22;">BRAKE</div>
        <div class="btn" id="btnGas" style="background: #2ecc71;">DRIVE</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="code.js"></script>
</body>
</html>
